name: PR Test Gate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-test-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit-and-widget:
    name: Unit + Widget Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Version
        run: flutter --version

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Unit Tests
        run: flutter test test/mvp/unit

      - name: Run Widget Tests
        run: flutter test test/mvp/widget
