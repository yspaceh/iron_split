name: Integration Suite

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: integration-suite-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-mvp:
    name: Integration Tests (MVP)
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Version
        run: flutter --version

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Integration Tests
        run: flutter test integration_test/mvp
